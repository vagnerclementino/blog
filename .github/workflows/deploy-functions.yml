name: Deploy Firebase Functions

on:
  push:
    branches: [main, feat/newsletter-signup]
    paths:
      - "functions/**"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Firebase Functions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        working-directory: functions
        run: npm ci

      - name: Run tests
        working-directory: functions
        run: npm test

      - name: Build TypeScript
        working-directory: functions
        run: npm run build

      - name: Deploy to Firebase Functions
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa_key.json
        run: |
          echo '${{ secrets.GCP_SA_KEY_FUNCTIONS_DEPLOY }}' > /tmp/sa_key.json
          npm install -g firebase-tools
          firebase deploy --only functions --project clementino-notes --non-interactive

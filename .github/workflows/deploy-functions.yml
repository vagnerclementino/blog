name: Deploy Newsletter Function

on:
  push:
    branches: [main, feat/newsletter-signup]
    paths:
      - "functions/**"

jobs:
  test-and-deploy:
    name: Test and Deploy Firebase Functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: functions/package-lock.json

      - name: Install functions dependencies
        working-directory: functions
        run: npm ci

      - name: Run tests
        working-directory: functions
        run: npm test

      - name: Build TypeScript
        working-directory: functions
        run: npm run build

      - name: Deploy to Firebase Functions
        working-directory: functions
        run: npx firebase-tools deploy --only functions --project clementino-notes --token "${{ secrets.FIREBASE_TOKEN }}"
